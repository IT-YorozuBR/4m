<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Checklist FR0062</title>
    <link rel="icon" href="./4m-logo.png" type="image/x-icon">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: "Segoe UI", Arial, sans-serif;
            background:
                radial-gradient(circle at top, rgba(0, 153, 255, 0.18), transparent 30%),
                linear-gradient(160deg, #050b14 0%, #0d1624 55%, #121212 100%);
            color: #f5f7fb;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .painel {
            width: min(520px, 100%);
            background: rgba(10, 19, 33, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
            padding: 32px;
            backdrop-filter: blur(14px);
        }

        .painel h1 {
            font-size: 2rem;
            margin-bottom: 12px;
        }

        .painel p {
            color: rgba(255, 255, 255, 0.72);
            line-height: 1.6;
            margin-bottom: 28px;
        }

        .grupo {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 18px;
        }

        label {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.84);
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.04);
            color: #fff;
            font-size: 1rem;
        }

        input:focus {
            outline: none;
            border-color: rgba(0, 153, 255, 0.6);
            box-shadow: 0 0 0 3px rgba(0, 153, 255, 0.16);
        }

        .acoes {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 28px;
        }

        button {
            border: none;
            border-radius: 12px;
            padding: 13px 18px;
            font-size: 0.98rem;
            cursor: pointer;
            transition: transform 0.18s ease, opacity 0.18s ease;
        }

        button:hover {
            transform: translateY(-1px);
        }

        .secundario {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }

        .primario {
            background: linear-gradient(135deg, #0d99ff 0%, #2a6df5 100%);
            color: #fff;
            font-weight: 600;
        }

        .erro {
            min-height: 20px;
            color: #ff8a8a;
            font-size: 0.92rem;
            margin-top: 6px;
        }
    </style>
</head>
<body>
    <div class="painel">
        <h1>Identificacao do Criador</h1>
        <p>Antes de abrir um novo checklist FR0062, informe o nome e a matricula de quem esta criando o registro.</p>

        <form id="formCriador">
            <div class="grupo">
                <label for="criadorNome">Nome</label>
                <input id="criadorNome" name="criadorNome" type="text" maxlength="120" required>
            </div>

            <div class="grupo">
                <label for="criadorMatricula">Matricula</label>
                <input id="criadorMatricula" name="criadorMatricula" type="text" maxlength="40" required>
                <div id="mensagemErro" class="erro"></div>
            </div>

            <div class="acoes">
                <button type="button" class="secundario" id="btnCancelar">Cancelar</button>
                <button type="submit" class="primario">Continuar</button>
            </div>
        </form>
    </div>

    <script>
        const chaveSessao = 'fr0062Criador';
        const form = document.getElementById('formCriador');
        const inputNome = document.getElementById('criadorNome');
        const inputMatricula = document.getElementById('criadorMatricula');
        const mensagemErro = document.getElementById('mensagemErro');

        const dadosExistentes = sessionStorage.getItem(chaveSessao);
        if (dadosExistentes) {
            try {
                const dados = JSON.parse(dadosExistentes);
                inputNome.value = dados.nome || '';
                inputMatricula.value = dados.matricula || '';
            } catch (_) {
                sessionStorage.removeItem(chaveSessao);
            }
        }

        document.getElementById('btnCancelar').addEventListener('click', () => {
            window.location.href = '/4m-checklist.html';
        });

        form.addEventListener('submit', (event) => {
            event.preventDefault();

            const nome = inputNome.value.trim();
            const matricula = inputMatricula.value.trim();

            if (!nome || !matricula) {
                mensagemErro.textContent = 'Preencha nome e matricula para continuar.';
                return;
            }

            sessionStorage.setItem(chaveSessao, JSON.stringify({
                nome,
                matricula
            }));

            window.location.href = '/FR0062-formulario.html';
        });
    </script>
</body>
</html>
