<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checklists FR0062 - Sistema de Qualidade</title>
  <link rel="icon" href="./4m-logo.png" type="image/x-icon">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #000;
      color: #fff;
      overflow-x: hidden;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 30px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .header-left {
      display: flex;
      flex-direction: column;
    }

    .header-left h1 {
      font-size: 2.5rem;
      color: #FFFFFF;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .header-left p {
      color: rgba(255, 255, 255, 0.7);
      font-size: 1.1rem;
    }

    .header-right {
      display: flex;
      gap: 15px;
    }

    .back-button,
    .novo-button {
      background: rgba(255, 255, 255, 0.1);
      color: #FFFFFF;
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s ease;
      text-decoration: none;
      border: none;
      font-family: inherit;
    }

    .novo-button {
      background: rgba(0, 150, 255, 0.2);
      border-color: rgba(0, 150, 255, 0.3);
    }

    .back-button:hover,
    .novo-button:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
    }

    .novo-button:hover {
      background: rgba(0, 150, 255, 0.3);
    }

    .filters {
      background: rgba(30, 30, 30, 0.8);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 40px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
    }

    .filters h2 {
      font-size: 1.3rem;
      margin-bottom: 20px;
      color: #FFFFFF;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .filter-group label {
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.7);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .filter-group input,
    .filter-group select {
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 12px 16px;
      color: #fff;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    .filter-group select option {
      background: #1a1a1a;
      color: #fff;
    }

    .filter-group input:focus,
    .filter-group select:focus {
      outline: none;
      border-color: rgba(255, 255, 255, 0.3);
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.1);
    }

    .filter-group input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .filter-actions {
      display: flex;
      gap: 15px;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .filter-button {
      background: rgba(255, 255, 255, 0.1);
      color: #FFFFFF;
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s ease;
      border: none;
      font-family: inherit;
    }

    .filter-button:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
    }

    .filter-button.primary {
      background: rgba(255, 255, 255, 0.15);
      color: #FFFFFF;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .filter-button.primary:hover {
      background: rgba(255, 255, 255, 0.25);
    }

    .view-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 15px;
    }

    .view-buttons {
      display: flex;
      gap: 10px;
    }

    .view-button {
      background: rgba(30, 30, 30, 0.8);
      color: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 10px 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s ease;
      border: none;
      font-family: inherit;
    }

    .view-button:hover {
      background: rgba(40, 40, 40, 0.8);
    }

    .view-button.active {
      background: rgba(255, 255, 255, 0.15);
      color: #FFFFFF;
      border-color: rgba(255, 255, 255, 0.3);
    }

    .stats {
      display: flex;
      gap: 15px;
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.7);
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* =============================================
       GRID DE CARDS
       minmax(min(350px, 100%), 1fr) garante que
       o mínimo nunca ultrapasse o container,
       evitando overflow em telas pequenas.
    ============================================= */
    .checklist-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(350px, 100%), 1fr));
      gap: 25px;
      margin-bottom: 40px;
    }

    /* MODO LISTA */
    .checklist-grid.list-view {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .checklist-grid.list-view .checklist-card {
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      align-items: center;
      gap: 20px;
      padding: 20px;
    }

    .checklist-grid.list-view .checklist-header {
      margin-bottom: 0;
    }

    .checklist-grid.list-view .checklist-info {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 30px;
      margin-bottom: 0;
    }

    .checklist-grid.list-view .checklist-info-item {
      margin-bottom: 0;
    }

    .checklist-grid.list-view .checklist-status {
      border-top: none;
      padding-top: 0;
      white-space: nowrap;
    }

    /* CARD */
    .checklist-card {
      background: rgba(30, 30, 30, 0.8);
      border-radius: 12px;
      padding: 25px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      animation: fadeIn 0.5s ease forwards;
    }

    .checklist-card:hover {
      transform: translateY(-5px);
      border-color: rgba(255, 255, 255, 0.15);
      box-shadow: 0 10px 30px rgba(0, 150, 255, 0.2);
    }

    .checklist-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
    }

    .checklist-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #FFFFFF;
      word-break: break-all;
    }

    .checklist-badge {
      background: rgba(0, 150, 255, 0.2);
      color: rgba(0, 150, 255, 1);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .checklist-info {
      display: grid;
      gap: 12px;
      margin-bottom: 20px;
    }

    .checklist-info-item {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .checklist-info-item span:first-child {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    .checklist-info-item span:last-child {
      color: rgba(255, 255, 255, 0.9);
      font-size: 0.95rem;
    }

    .checklist-status {
      display: flex;
      align-items: center;
      gap: 8px;
      color: rgba(255, 255, 255, 0.7);
      padding-top: 15px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .checklist-actions {
      display: flex;
      gap: 8px;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      visibility: hidden;
      opacity: 0;
      transition: all 0.3s ease;
    }

    .checklist-card:hover .checklist-actions {
      visibility: visible;
      opacity: 1;
    }

    .action-button {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.05);
      color: rgba(255, 255, 255, 0.8);
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s ease;
      text-decoration: none;
      font-family: inherit;
      font-weight: 500;
    }

    .action-button:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.3);
      color: #fff;
    }

    .action-button.edit {
      color: rgba(0, 150, 255, 0.9);
      border-color: rgba(0, 150, 255, 0.3);
    }

    .action-button.edit:hover {
      background: rgba(0, 150, 255, 0.1);
      border-color: rgba(0, 150, 255, 0.5);
      color: #00bbff;
    }

    .action-button.delete {
      color: rgba(244, 67, 54, 0.9);
      border-color: rgba(244, 67, 54, 0.3);
    }

    .action-button.delete:hover {
      background: rgba(244, 67, 54, 0.1);
      border-color: rgba(244, 67, 54, 0.5);
      color: #ff6b6b;
    }

    .action-button.disabled {
      opacity: 0.4;
      cursor: not-allowed;
      pointer-events: none;
    }

    .loading {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px;
      color: rgba(255, 255, 255, 0.5);
    }

    .loading .material-icons {
      font-size: 4rem;
      margin-bottom: 20px;
      color: rgba(255, 255, 255, 0.2);
      animation: spin 1s linear infinite;
    }

    /* =============================================
       PAGINAÇÃO
    ============================================= */
    .pagination-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      padding: 30px 0;
      margin-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      flex-wrap: wrap;
    }

    .pagination-info {
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.7);
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 200px;
      justify-content: center;
    }

    .pagination-info strong {
      color: rgba(0, 150, 255, 0.9);
    }

    .pagination-buttons {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .pagination-btn {
      background: rgba(30, 30, 30, 0.8);
      color: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 10px 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.3s ease;
      font-family: inherit;
      font-size: 0.9rem;
      white-space: nowrap;
    }

    .pagination-btn:hover:not(:disabled) {
      background: rgba(40, 40, 40, 0.8);
      border-color: rgba(255, 255, 255, 0.2);
      color: rgba(255, 255, 255, 0.9);
      transform: translateY(-2px);
    }

    .pagination-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      pointer-events: none;
    }

    .pagination-btn.active {
      background: rgba(0, 150, 255, 0.2);
      border-color: rgba(0, 150, 255, 0.3);
      color: rgba(0, 150, 255, 0.9);
    }

    .pagination-numbers {
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .page-number {
      background: rgba(30, 30, 30, 0.8);
      color: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      padding: 8px 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 36px;
      transition: all 0.3s ease;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .page-number:hover {
      background: rgba(40, 40, 40, 0.8);
      border-color: rgba(255, 255, 255, 0.2);
      color: rgba(255, 255, 255, 0.9);
    }

    .page-number.active {
      background: rgba(0, 150, 255, 0.2);
      border-color: rgba(0, 150, 255, 0.3);
      color: rgba(0, 150, 255, 0.9);
    }

    .page-ellipsis {
      color: rgba(255, 255, 255, 0.5);
      padding: 8px 4px;
    }

    .items-per-page {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.7);
    }

    .items-per-page select {
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      padding: 8px 12px;
      color: #fff;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .items-per-page select:hover {
      border-color: rgba(255, 255, 255, 0.2);
    }

    .items-per-page select:focus {
      outline: none;
      border-color: rgba(255, 255, 255, 0.3);
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.1);
    }

    .items-per-page select option {
      background: #1a1a1a;
      color: #fff;
    }

    /* PIPELINE VISUAL */
    .card-pipeline {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 15px 0;
      padding: 15px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .pipe-step {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid var(--c);
      background: transparent;
      font-size: 12px;
      flex-shrink: 0;
      transition: all 0.3s ease;
    }

    .pipe-step.pipe-ok {
      background: var(--c);
      color: #000;
    }

    .pipe-step.pipe-ativa {
      background: var(--c);
      color: #fff;
      box-shadow: 0 0 12px var(--c);
    }

    .pipe-step.pipe-inativa {
      opacity: 0.3;
    }

    .pipe-line {
      width: 16px;
      height: 2px;
      background: rgba(255, 255, 255, 0.2);
      flex-shrink: 0;
    }

    .pipe-line.pipe-line-ok {
      background: rgba(46, 125, 50, 0.6);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeOut {
      from {
        opacity: 1;
        transform: translateY(0);
      }

      to {
        opacity: 0;
        transform: translateY(-20px);
      }
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .notification {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 15px 20px;
      background: #4CAF50;
      color: white;
      border-radius: 8px;
      z-index: 1000;
      animation: slideIn 0.3s ease;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }

    .notification.error {
      background: #F44336;
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }

      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @media (max-width: 768px) {
      .container {
        padding: 15px;
      }

      .header {
        flex-direction: column;
        gap: 20px;
        text-align: center;
      }

      .header-left h1 {
        font-size: 1.8rem;
      }

      .header-right {
        width: 100%;
        flex-direction: column;
      }

      .header-right button {
        width: 100%;
      }

      .filter-grid {
        grid-template-columns: 1fr;
      }

      .pagination-container {
        flex-direction: column;
        gap: 15px;
      }

      .pagination-info {
        min-width: auto;
      }

      .pagination-numbers {
        flex-wrap: wrap;
        justify-content: center;
      }

      .view-controls {
        flex-direction: column;
        align-items: flex-start;
      }

      .stats {
        flex-wrap: wrap;
        width: 100%;
      }

      .checklist-grid.list-view .checklist-card {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .checklist-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (min-width: 1200px) {
      .checklist-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (min-width: 1600px) {
      .checklist-grid {
        grid-template-columns: repeat(4, 1fr);
      }

      .container {
        max-width: 1800px;
      }
    }
  </style>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>

<body>
  <div class="container">
    <div class="header">
      <div class="header-left">
        <h1>📋 Checklists FR0062</h1>
        <p>Gerenciar e visualizar todos os checklists salvos</p>
      </div>
      <div class="header-right">
        <button class="back-button" id="btnVoltar">
          <span class="material-icons">arrow_back</span>
          Voltar
        </button>
        <button class="novo-button" onclick="window.location.href='/FR0062-formulario.html'">
          <span class="material-icons">add</span>
          Novo Checklist
        </button>
      </div>
    </div>

    <div class="filters">
      <h2>
        <span class="material-icons">filter_list</span>
        Filtros
      </h2>
      <div class="filter-grid">
        <div class="filter-group">
          <label for="numero"><span class="material-icons">tag</span> Buscar</label>
          <input type="text" id="numero" name="numero" placeholder="Número, criado por ou status...">
        </div>

        <div class="filter-group">
          <label for="status"><span class="material-icons">status</span> Status</label>
          <select id="status" name="status">
            <option value="">Todos os status</option>
            <option value="em_andamento">Etapa 1 — Produção</option>
            <option value="aguardando_qualidade">Etapa 2 — Qualidade</option>
            <option value="aguardando_aprovacao">Etapa 3 — Aprovação</option>
            <option value="concluido">Concluído</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="ano"><span class="material-icons">event</span> Ano</label>
          <select id="ano" name="ano">
            <option value="">Todos os anos</option>
            <option value="2024">2024</option>
            <option value="2025">2025</option>
            <option value="2026">2026</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="limite"><span class="material-icons">view_agenda</span> Itens por página</label>
          <select id="limite" name="limite">
            <option value="5">5 itens</option>
            <option value="10" selected>10 itens</option>
            <option value="20">20 itens</option>
            <option value="50">50 itens</option>
          </select>
        </div>
      </div>

      <div class="filter-actions">
        <button class="filter-button primary" id="filtrar">
          <span class="material-icons">search</span>
          Pesquisar
        </button>
        <button class="filter-button" id="limpar">
          <span class="material-icons">refresh</span>
          Limpar
        </button>
      </div>
    </div>

    <div class="view-controls">
      <div class="view-buttons">
        <button class="view-button active" id="viewGrid">
          <span class="material-icons">grid_view</span>
          Grade
        </button>
        <button class="view-button" id="viewList">
          <span class="material-icons">view_list</span>
          Lista
        </button>
      </div>

      <div class="stats" id="statsContainer">
        <div class="stat-item">
          <span class="material-icons" style="font-size: 16px;">description</span>
          <span>Total: <strong id="countTotal">0</strong></span>
        </div>
        <div class="stat-item" style="color:#1976D2">
          <span class="material-icons" style="font-size: 16px; color:#1976D2">engineering</span>
          <span>Produção: <strong id="countProducao">0</strong></span>
        </div>
        <div class="stat-item" style="color:#E65100">
          <span class="material-icons" style="font-size: 16px; color:#E65100">rule</span>
          <span>Qualidade: <strong id="countQualidade">0</strong></span>
        </div>
        <div class="stat-item" style="color:#6A1B9A">
          <span class="material-icons" style="font-size: 16px; color:#6A1B9A">verified</span>
          <span>Aprovação: <strong id="countAprovacao">0</strong></span>
        </div>
        <div class="stat-item" style="color:#2E7D32">
          <span class="material-icons" style="font-size: 16px; color:#2E7D32">check_circle</span>
          <span>Concluídos: <strong id="countAprovados">0</strong></span>
        </div>
      </div>
    </div>

    <div class="checklist-grid" id="checklistList">
      <div class="loading" id="loading">
        <span class="material-icons">refresh</span>
        <p>Carregando checklists...</p>
      </div>
    </div>

    <!-- PAGINAÇÃO -->
    <div class="pagination-container" id="paginationContainer" style="display: none;">
      <div class="pagination-info">
        Página <strong id="paginaAtual">1</strong> de <strong id="totalPaginas">1</strong> 
        (<strong id="totalDocumentos">0</strong> resultados)
      </div>

      <div class="pagination-buttons">
        <button class="pagination-btn" id="btnAnterior" title="Página anterior">
          <span class="material-icons">chevron_left</span>
          Anterior
        </button>

        <div class="pagination-numbers" id="numerosPaginas"></div>

        <button class="pagination-btn" id="btnProximo" title="Próxima página">
          Próxima
          <span class="material-icons">chevron_right</span>
        </button>
      </div>
    </div>
  </div>

  <script>
    const viewGridBtn = document.getElementById('viewGrid');
    const viewListBtn = document.getElementById('viewList');
    const checklistList = document.getElementById('checklistList');
    const btnVoltar = document.getElementById('btnVoltar');
    const paginationContainer = document.getElementById('paginationContainer');

    // Estado da paginação
    let estadoPaginacao = {
      pagina_atual: 1,
      total_paginas: 1,
      limite_por_pagina: 10,
      total_documentos: 0,
      tem_proxima: false,
      tem_anterior: false
    };

    let filtroAtual = {
      busca: '',
      status: '',
      ano: '',
      pagina: 1,
      limite: 10
    };

    const API_URL = window.location.hostname === 'localhost'
      ? 'http://localhost:3001/api'
      : 'https://fourm-znis.onrender.com/api';

    document.addEventListener('DOMContentLoaded', function () {
      configurarEventos();
      carregarChecklists();
      const savedViewMode = localStorage.getItem('viewMode') || 'grid';
      alternarVisualizacao(savedViewMode);
    });

    function configurarEventos() {
      viewGridBtn.addEventListener('click', () => alternarVisualizacao('grid'));
      viewListBtn.addEventListener('click', () => alternarVisualizacao('list'));

      btnVoltar.addEventListener('click', () => {
        window.location.href = '/4m.html';
      });

      document.getElementById('filtrar').addEventListener('click', () => {
        filtroAtual.pagina = 1; // Resetar para primeira página
        aplicarFiltros();
      });

      document.getElementById('limpar').addEventListener('click', limparFiltros);

      document.getElementById('btnAnterior').addEventListener('click', irParaPaginaAnterior);
      document.getElementById('btnProximo').addEventListener('click', irParaProximaPagina);

      document.getElementById('limite').addEventListener('change', (e) => {
        filtroAtual.limite = parseInt(e.target.value);
        filtroAtual.pagina = 1; // Resetar para primeira página
        carregarChecklists();
      });

      document.addEventListener('keydown', function (e) {
        if (e.key === 'F5') {
          e.preventDefault();
          filtroAtual.pagina = 1;
          carregarChecklists();
        }
        if (e.ctrlKey && e.key === 'n') {
          e.preventDefault();
          window.location.href = '/FR0062-formulario.html';
        }
        if (e.ctrlKey && e.key === 'f') {
          e.preventDefault();
          document.getElementById('numero').focus();
        }
        if (e.key === 'Escape') {
          window.location.href = '/4m.html';
        }
      });
    }

    function alternarVisualizacao(tipo) {
      if (tipo === 'grid') {
        checklistList.classList.remove('list-view');
        viewGridBtn.classList.add('active');
        viewListBtn.classList.remove('active');
        localStorage.setItem('viewMode', 'grid');
      } else {
        checklistList.classList.add('list-view');
        viewListBtn.classList.add('active');
        viewGridBtn.classList.remove('active');
        localStorage.setItem('viewMode', 'list');
      }
    }

    function construirParamsConsulta() {
      const params = new URLSearchParams({
        page: filtroAtual.pagina,
        limit: filtroAtual.limite
      });

      if (filtroAtual.busca.trim()) {
        params.append('busca', filtroAtual.busca.trim());
      }

      if (filtroAtual.status) {
        params.append('status', filtroAtual.status);
      }

      if (filtroAtual.ano) {
        params.append('ano', filtroAtual.ano);
      }

      return params;
    }

    function atualizarEstatisticas(stats) {
      document.getElementById('countTotal').textContent = stats?.total || 0;
      document.getElementById('countProducao').textContent = stats?.em_andamento || 0;
      document.getElementById('countQualidade').textContent = stats?.aguardando_qualidade || 0;
      document.getElementById('countAprovacao').textContent = stats?.aguardando_aprovacao || 0;
      document.getElementById('countAprovados').textContent = stats?.concluido || 0;
    }

    async function carregarChecklists() {
      try {
        mostrarLoading();

        const params = construirParamsConsulta();

        console.log('📡 Buscando checklists com params:', params.toString());
        const response = await fetch(`${API_URL}/fr0062?${params}`);
        const result = await response.json();

        console.log('📦 Resposta da API:', result);

        const formularios = result.data || result.formularios || [];
        const pagination = result.pagination || null;

        if (result.success && Array.isArray(formularios)) {
          if (pagination) {
            estadoPaginacao = {
              pagina_atual: pagination.page,
              total_paginas: pagination.totalPages,
              limite_por_pagina: pagination.limit,
              total_documentos: pagination.total,
              tem_proxima: pagination.page < pagination.totalPages,
              tem_anterior: pagination.page > 1
            };
          } else if (result.paginacao) {
            estadoPaginacao = result.paginacao;
          } else {
            estadoPaginacao = {
              pagina_atual: 1,
              total_paginas: 1,
              limite_por_pagina: filtroAtual.limite,
              total_documentos: formularios.length,
              tem_proxima: false,
              tem_anterior: false
            };
          }

          exibirChecklists(formularios);
          atualizarEstatisticas(result.stats);
          atualizarPaginacao();
          paginationContainer.style.display = estadoPaginacao.total_documentos > 0 ? 'flex' : 'none';
        } else {
          console.warn('⚠️ Resposta sem sucesso ou sem formulários:', result);
          atualizarEstatisticas();
          exibirMensagemSemDados();
          paginationContainer.style.display = 'none';
        }
      } catch (error) {
        console.error('❌ Erro ao carregar checklists:', error);
        exibirMensagemErro('Erro ao carregar checklists. Verifique a conexão com o servidor. ' + error.message);
        atualizarEstatisticas();
        paginationContainer.style.display = 'none';
      }
    }

    function aplicarFiltros() {
      filtroAtual.busca = document.getElementById('numero').value;
      filtroAtual.status = document.getElementById('status').value;
      filtroAtual.ano = document.getElementById('ano').value;
      carregarChecklists();
    }

    function limparFiltros() {
      document.getElementById('numero').value = '';
      document.getElementById('status').value = '';
      document.getElementById('ano').value = '';
      document.getElementById('limite').value = '10';
      filtroAtual = {
        busca: '',
        status: '',
        ano: '',
        pagina: 1,
        limite: 10
      };
      carregarChecklists();
    }

    function irParaPaginaAnterior() {
      if (estadoPaginacao && estadoPaginacao.tem_anterior) {
        filtroAtual.pagina--;
        carregarChecklists();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }

    function irParaProximaPagina() {
      if (estadoPaginacao && estadoPaginacao.tem_proxima) {
        filtroAtual.pagina++;
        carregarChecklists();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }

    function irParaPagina(numeroPagina) {
      if (estadoPaginacao && numeroPagina >= 1 && numeroPagina <= estadoPaginacao.total_paginas) {
        filtroAtual.pagina = numeroPagina;
        carregarChecklists();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }

    function atualizarPaginacao() {
      // Validar se estadoPaginacao existe e tem os valores esperados
      if (!estadoPaginacao || typeof estadoPaginacao !== 'object') {
        console.warn('⚠️ estadoPaginacao inválido:', estadoPaginacao);
        return;
      }

      const {
        pagina_atual = 1,
        total_paginas = 1,
        total_documentos = 0,
        tem_anterior = false,
        tem_proxima = false
      } = estadoPaginacao;

      // Atualizar informações
      document.getElementById('paginaAtual').textContent = pagina_atual;
      document.getElementById('totalPaginas').textContent = total_paginas;
      document.getElementById('totalDocumentos').textContent = total_documentos;

      // Atualizar botões anterior/próximo
      document.getElementById('btnAnterior').disabled = !tem_anterior;
      document.getElementById('btnProximo').disabled = !tem_proxima;

      // Gerar números de página
      const numerosPaginas = document.getElementById('numerosPaginas');
      numerosPaginas.innerHTML = '';

      const maxBotoes = 5;
      let inicio = Math.max(1, pagina_atual - Math.floor(maxBotoes / 2));
      let fim = Math.min(total_paginas, inicio + maxBotoes - 1);

      if (fim - inicio + 1 < maxBotoes) {
        inicio = Math.max(1, fim - maxBotoes + 1);
      }

      // Botão primeira página
      if (inicio > 1) {
        const btn1 = document.createElement('button');
        btn1.className = 'page-number';
        btn1.textContent = '1';
        btn1.addEventListener('click', () => irParaPagina(1));
        numerosPaginas.appendChild(btn1);

        if (inicio > 2) {
          const ellipsis = document.createElement('span');
          ellipsis.className = 'page-ellipsis';
          ellipsis.textContent = '...';
          numerosPaginas.appendChild(ellipsis);
        }
      }

      // Botões das páginas
      for (let i = inicio; i <= fim; i++) {
        const btn = document.createElement('button');
        btn.className = 'page-number';
        if (i === pagina_atual) {
          btn.classList.add('active');
        }
        btn.textContent = i;
        btn.addEventListener('click', () => irParaPagina(i));
        numerosPaginas.appendChild(btn);
      }

      // Botão última página
      if (fim < total_paginas) {
        if (fim < total_paginas - 1) {
          const ellipsis = document.createElement('span');
          ellipsis.className = 'page-ellipsis';
          ellipsis.textContent = '...';
          numerosPaginas.appendChild(ellipsis);
        }

        const btnUltima = document.createElement('button');
        btnUltima.className = 'page-number';
        btnUltima.textContent = total_paginas;
        btnUltima.addEventListener('click', () => irParaPagina(total_paginas));
        numerosPaginas.appendChild(btnUltima);
      }
    }

    function exibirChecklists(checklists) {
      if (checklists.length === 0) {
        exibirMensagemSemDados();
        return;
      }

      checklistList.innerHTML = '';

      checklists.forEach((checklist, index) => {
        const card = criarCardChecklist(checklist, index);
        checklistList.appendChild(card);
      });
    }

    function criarCardChecklist(checklist, index) {
      const card = document.createElement('div');
      card.className = 'checklist-card';

      const dataFormatada = formatarData(checklist.data_criacao);
      const status = checklist.status || 'em_andamento';
      const isConcluido = status === 'concluido' || status === 'finalizado';

      const STATUS_MAP = {
        'em_andamento':         { cor: '#1565C0', bg: 'rgba(21,101,192,.15)',  label: 'Etapa 1 — Produção',  icone: 'engineering', etapa: 1 },
        'aguardando_qualidade': { cor: '#E65100', bg: 'rgba(230,81,0,.15)',    label: 'Etapa 2 — Qualidade', icone: 'rule',        etapa: 2 },
        'aguardando_aprovacao': { cor: '#6A1B9A', bg: 'rgba(106,27,154,.15)',  label: 'Etapa 3 — Aprovação', icone: 'verified',    etapa: 3 },
        'concluido':            { cor: '#2E7D32', bg: 'rgba(46,125,50,.15)',   label: 'Concluído',           icone: 'check_circle',etapa: 4 },
        'finalizado':           { cor: '#2E7D32', bg: 'rgba(46,125,50,.15)',   label: 'Concluído',           icone: 'check_circle',etapa: 4 },
      };
      const statusInfo = STATUS_MAP[status] || STATUS_MAP['em_andamento'];

      // Obter usuário logado
      const usuarioLogado = JSON.parse(localStorage.getItem('currentUser') || '{}');
      const estaLogado = !!usuarioLogado.username;

      const podeDeletar = estaLogado;
      const podeEditar = estaLogado || (!estaLogado && !isConcluido);

      card.innerHTML = `
    <div class="checklist-header">
      <div class="checklist-title">${checklist.numero_controle}</div>
    </div>
    <div class="checklist-info">
      <div class="checklist-info-item">
        <span>Solicitado por</span>
        <span>${checklist.solicitado_por || 'N/A'}</span>
      </div>
      <div class="checklist-info-item">
        <span>Criado em</span>
        <span>${dataFormatada}</span>
      </div>
      <div class="checklist-info-item">
        <span>Atualizado em</span>
        <span>${formatarData(checklist.data_atualizacao)}</span>
      </div>
    </div>

    <div class="card-pipeline">
      ${[1,2,3,4].map(n => {
        const nomes = {1:'Produção',2:'Qualidade',3:'Aprovação',4:'Concluído'};
        const cores = {1:'#1565C0',2:'#E65100',3:'#6A1B9A',4:'#2E7D32'};
        const etapaAtiva = statusInfo.etapa;
        const cls = n < etapaAtiva ? 'pipe-ok' : n === etapaAtiva ? 'pipe-ativa' : 'pipe-inativa';
        return `<div class="pipe-step ${cls}" style="--c:${cores[n]}">
        </div>${n < 4 ? '<div class="pipe-line ' + (n < etapaAtiva ? 'pipe-line-ok' : '') + '"></div>' : ''}`;
      }).join('')}
    </div>

    <div class="checklist-status" style="background:${statusInfo.bg}; border-radius:6px; padding:8px 12px; margin-top:8px;">
      <span class="material-icons" style="font-size: 16px; color: ${statusInfo.cor};">${statusInfo.icone}</span>
      <span style="color: ${statusInfo.cor}; font-weight:600; font-size:.9rem;">${statusInfo.label}</span>
    </div>
    
    <div class="checklist-actions">
      <button class="action-button edit" data-numero="${checklist.numero_controle}" title="${podeEditar ? 'Editar checklist' : 'Visualizar checklist'}">
        <span class="material-icons" style="font-size: 16px;">${podeEditar ? 'edit' : 'visibility'}</span>
        ${podeEditar ? 'Editar' : 'Visualizar'}
      </button>
      ${podeDeletar ? `
      <button class="action-button delete" data-numero="${checklist.numero_controle}" title="Deletar checklist">
        <span class="material-icons" style="font-size: 16px;">delete</span>
        Deletar
      </button>
      ` : ''}
    </div>
  `;

      // Evento de clique no card
      card.addEventListener('click', (e) => {
        if (!e.target.closest('.checklist-actions')) {
          window.location.href = `/FR0062-formulario.html?id=${encodeURIComponent(checklist.numero_controle)}`;
        }
      });

      // Event listener para o botão editar/visualizar
      const editBtn = card.querySelector('.action-button.edit');
      if (editBtn) {
        editBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          window.location.href = `/FR0062-formulario.html?id=${encodeURIComponent(checklist.numero_controle)}`;
        });
      }

      // Event listener para o botão deletar
      const deleteBtn = card.querySelector('.action-button.delete');
      if (deleteBtn) {
        deleteBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          deletarChecklist(checklist.numero_controle, checklist, card);
        });
      }

      card.style.animationDelay = `${index * 0.05}s`;
      return card;
    }

    async function deletarChecklist(numeroControle, checklist, cardElement) {
      const usuarioLogado = JSON.parse(localStorage.getItem('currentUser') || '{}');
      const token = localStorage.getItem('authToken');

      if (!usuarioLogado.username || !token) {
        alert('Você precisa estar logado para deletar');
        window.location.href = '/login.html';
        return;
      }

      const confirmacao = confirm(
        `Tem certeza que deseja deletar o checklist "${numeroControle}"?\n\nEsta ação não pode ser desfeita.`
      );

      if (!confirmacao) return;

      try {
        const response = await fetch(`${API_URL}/fr0062/${encodeURIComponent(numeroControle)}`, {
          method: 'DELETE',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          }
        });

        const data = await response.json();

        if (response.status === 401 || response.status === 403) {
          alert('Sessão expirada. Por favor, faça login novamente.');
          localStorage.removeItem('currentUser');
          localStorage.removeItem('authToken');
          window.location.href = '/login.html';
          return;
        }

        if (response.ok && data.success) {
          cardElement.style.animation = 'fadeOut 0.3s ease forwards';
          setTimeout(() => {
            cardElement.remove();
            // Recarregar se nenhum card restante
            if (document.querySelectorAll('.checklist-card').length === 0) {
              carregarChecklists();
            }
          }, 300);
        } else {
          alert(`Erro ao deletar: ${data.message || 'Erro desconhecido'}`);
        }
      } catch (error) {
        console.error('Erro ao deletar:', error);
        alert('Erro ao deletar o checklist. Tente novamente.');
      }
    }



    function mostrarLoading() {
      checklistList.innerHTML = `
        <div class="loading" id="loading">
          <span class="material-icons">refresh</span>
          <p>Carregando checklists...</p>
        </div>
      `;
    }

    function exibirMensagemSemDados() {
      checklistList.innerHTML = `
        <div style="grid-column: 1/-1; text-align: center; padding: 60px 20px; color: rgba(255,255,255,0.5);">
          <div style="font-size: 4rem; margin-bottom: 20px;">📭</div>
          <h3 style="font-size: 1.5rem; margin-bottom: 10px;">Nenhum checklist encontrado</h3>
          <p>Crie um novo checklist para começar</p>
          <button class="novo-button" onclick="window.location.href='/FR0062-formulario.html'" style="margin-top: 20px; border: 1px solid rgba(0,150,255,0.3);">​
            <span class="material-icons">add</span>
            Novo Checklist
          </button>
        </div>
      `;
    }

    function exibirMensagemErro(mensagem) {
      checklistList.innerHTML = `
        <div style="grid-column: 1/-1; text-align: center; padding: 60px 20px; color: #F44336;">
          <div style="font-size: 4rem; margin-bottom: 20px;">⚠️</div>
          <h3 style="font-size: 1.5rem; margin-bottom: 10px;">Erro ao carregar</h3>
          <p>${mensagem}</p>
          <button class="filter-button primary" onclick="carregarChecklists()" style="margin-top: 20px; border: 1px solid rgba(255,255,255,0.3);">
            <span class="material-icons">refresh</span>
            Tentar Novamente
          </button>
        </div>
      `;
    }

    function formatarData(dataString) {
      try {
        const data = new Date(dataString);
        return data.toLocaleDateString('pt-BR', {
          day: '2-digit',
          month: '2-digit',
          year: 'numeric',
          hour: '2-digit',
          minute: '2-digit'
        });
      } catch {
        return dataString;
      }
    }
  </script>
</body>

</html>
