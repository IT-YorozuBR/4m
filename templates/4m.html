<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>4M Sistema</title>
  <link rel="icon" href="./4m-logo.png" type="image/x-icon">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    :root {
      --bg: #050505;
      --panel: #141414;
      --panel-soft: #1b1b1b;
      --line: rgba(255, 255, 255, .1);
      --line-strong: rgba(255, 214, 0, .32);
      --text: #fff;
      --muted: rgba(255, 255, 255, .7);
      --muted-soft: rgba(255, 255, 255, .5);
      --accent: #ffd600;
      --accent-soft: rgba(255, 214, 0, .14);
      --danger: #ff9d97;
      --danger-soft: rgba(244, 67, 54, .16);
      --shadow: 0 18px 50px rgba(0, 0, 0, .34)
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: radial-gradient(circle at top, rgba(255, 214, 0, .08), transparent 24%), linear-gradient(180deg, #0a0a0a, #000 42%);
      color: var(--text);
      min-height: 100vh
    }

    .navbar {
      position: sticky;
      top: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 16px 24px;
      background: rgba(8, 8, 8, .92);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255, 255, 255, .08);
      z-index: 10
    }

    .navbar-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: .02em
    }

    .navbar-right {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end
    }

    .chip,
    .btn,
    .login-prompt {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .05);
      color: var(--text);
      text-decoration: none;
      font: inherit;
      transition: transform .18s ease, border-color .18s ease, background .18s ease
    }

    .btn:hover,
    .login-prompt:hover,
    .chip:hover {
      transform: translateY(-1px);
      border-color: rgba(255, 255, 255, .2)
    }

    .chip {
      padding: 8px 12px
    }

    .btn-admin {
      background: linear-gradient(135deg, rgba(255, 214, 0, .18), rgba(255, 214, 0, .08));
      color: var(--accent);
      border-color: rgba(255, 214, 0, .28)
    }

    .btn-danger {
      background: var(--danger-soft);
      color: var(--danger);
      border-color: rgba(244, 67, 54, .26)
    }

    .btn-ghost {
      background: transparent
    }

    .btn-block {
      width: 100%
    }

    .dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      padding: 28px;
      max-width: 1400px;
      margin: 0 auto 110px
    }

    .card {
      position: relative;
      background: linear-gradient(180deg, rgba(25, 25, 25, .98), rgba(16, 16, 16, .98));
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: 22px;
      padding: 22px;
      min-height: 220px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      cursor: pointer;
      overflow: hidden;
      transition: transform .2s ease, border-color .2s ease, box-shadow .2s ease
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, .06), transparent 35%, transparent 65%, rgba(255, 214, 0, .05));
      opacity: 0;
      transition: opacity .2s ease
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: rgba(255, 255, 255, .18);
      box-shadow: var(--shadow)
    }

    .card:hover::before {
      opacity: 1
    }

    .card.draggable {
      cursor: grab
    }

    .card.dragging {
      opacity: .72
    }

    .card-4m {
      background: linear-gradient(135deg, rgba(45, 45, 45, .98), rgba(14, 14, 14, .98));
      border-color: rgba(255, 214, 0, .18)
    }

    .card-add {
      border-style: dashed;
      border-color: var(--line-strong);
      background: linear-gradient(180deg, rgba(38, 31, 0, .32), rgba(17, 17, 17, .96));
      color: var(--accent)
    }

    .card-top {
      position: relative;
      z-index: 1;
      text-align: center
    }

    .card-4m .title {
      text-align: left;
      color: var(--accent);
      font-size: 2.3rem
    }

    .title {
      font-size: 1.35rem;
      font-weight: 700
    }

    .icon {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 70px;
      font-size: 2.6rem;
      color: #d8d8d8
    }

    .desc {
      margin-top: 10px;
      text-align: center;
      color: var(--muted);
      line-height: 1.45
    }

    .footer {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      color: rgba(255, 255, 255, .74)
    }

    .badge {
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .1);
      font-size: .82rem
    }

    .card-add .badge {
      background: rgba(255, 214, 0, .18);
      color: var(--accent)
    }

    .card-add .icon {
      height: auto;
      margin-bottom: 16px
    }

    .card-add .icon .material-icons {
      font-size: 3.2rem;
      padding: 14px;
      border-radius: 18px;
      background: rgba(255, 214, 0, .14);
      box-shadow: inset 0 0 0 1px rgba(255, 214, 0, .18)
    }

    .card-add .desc {
      text-align: left
    }

    .card-add-points {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 16px;
      color: #ffe88a;
      font-size: .92rem;
      text-align: left
    }

    .card-add-points span {
      display: flex;
      align-items: center;
      gap: 8px
    }

    .card-add-points .material-icons {
      font-size: 18px
    }

    .modal-wrap {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .88);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 20
    }

    .modal-wrap.active {
      display: flex
    }

    .modal {
      width: min(820px, 100%);
      max-height: 88vh;
      overflow: auto;
      background: linear-gradient(180deg, rgba(24, 24, 24, .98), rgba(16, 16, 16, .98));
      border: 1px solid rgba(255, 255, 255, .1);
      border-radius: 24px;
      padding: 26px;
      box-shadow: var(--shadow)
    }

    .modal h2 {
      margin-bottom: 8px;
      font-size: 1.6rem
    }

    .modal p {
      color: var(--muted);
      line-height: 1.5
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 22px
    }

    .modal-header-main {
      display: flex;
      gap: 14px;
      align-items: flex-start
    }

    .modal-icon-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      border-radius: 16px;
      background: rgba(255, 214, 0, .12);
      color: var(--accent);
      flex-shrink: 0
    }

    .modal-subtitle {
      margin-top: 6px;
      color: var(--muted)
    }

    .modal-section {
      margin-top: 18px;
      padding: 18px;
      border-radius: 18px;
      background: rgba(255, 255, 255, .04);
      border: 1px solid rgba(255, 255, 255, .08)
    }

    .modal-section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 14px
    }

    .modal-section-title h3 {
      font-size: 1rem
    }

    .sub-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 4px
    }

    .sub-item {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      padding: 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, .04);
      border: 1px solid rgba(255, 255, 255, .08)
    }

    .sub-name {
      font-weight: 600;
      word-break: break-word
    }

    .sub-link {
      margin-top: 6px;
      color: var(--muted-soft);
      font-size: .92rem;
      word-break: break-all
    }

    .sub-actions,
    .modal-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap
    }

    .modal-actions {
      margin-top: 22px
    }

    .modal-actions.end {
      justify-content: flex-end
    }

    .empty {
      padding: 22px;
      text-align: center;
      border: 1px dashed rgba(255, 255, 255, .12);
      border-radius: 14px;
      color: rgba(255, 255, 255, .66)
    }

    .toast {
      position: fixed;
      right: 16px;
      top: 16px;
      background: #1d1d1d;
      border: 1px solid rgba(255, 255, 255, .1);
      padding: 12px 14px;
      border-radius: 12px;
      z-index: 30
    }

    .info {
      position: fixed;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      background: rgba(20, 20, 20, .9);
      border: 1px solid rgba(255, 255, 255, .08);
      padding: 10px 16px;
      border-radius: 999px;
      color: rgba(255, 255, 255, .72)
    }

    .form-grid {
      display: grid;
      gap: 16px
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px
    }

    .field label {
      font-size: .94rem;
      font-weight: 600;
      color: #f6f6f6
    }

    .field input,
    .field textarea,
    .field select {
      width: 100%;
      padding: 13px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, .12);
      background: rgba(255, 255, 255, .05);
      color: var(--text);
      font: inherit;
      transition: border-color .18s ease, box-shadow .18s ease, background .18s ease
    }

    .field input:focus,
    .field textarea:focus,
    .field select:focus {
      outline: none;
      border-color: rgba(255, 214, 0, .34);
      box-shadow: 0 0 0 4px rgba(255, 214, 0, .08);
      background: rgba(255, 255, 255, .07)
    }

    .field select {
      appearance: none
    }

    .field textarea {
      min-height: 110px;
      resize: vertical
    }

    .field small {
      color: var(--muted-soft);
      line-height: 1.4
    }

    .form-banner {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 16px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(255, 214, 0, .12), rgba(255, 214, 0, .04));
      border: 1px solid rgba(255, 214, 0, .18);
      color: #ffe88a
    }

    .form-banner .material-icons {
      font-size: 20px;
      flex-shrink: 0
    }

    .form-error {
      display: none;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(244, 67, 54, .12);
      border: 1px solid rgba(244, 67, 54, .2);
      color: var(--danger)
    }

    .form-error.active {
      display: block
    }

    .user-list {
      display: grid;
      gap: 10px
    }

    .user-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, .04);
      border: 1px solid rgba(255, 255, 255, .08)
    }

    @media (max-width:700px) {
      .navbar {
        padding: 14px 16px
      }

      .dashboard {
        padding: 16px
      }

      .title {
        font-size: 1.2rem
      }

      .card-4m .title {
        font-size: 2rem
      }

      .sub-item,
      .modal-header,
      .modal-header-main {
        flex-direction: column
      }

      .sub-actions,
      .modal-actions,
      .modal-section-title {
        align-items: stretch
      }

      .hero-metrics {
        grid-template-columns: 1fr
      }

      .info {
        width: calc(100% - 32px);
        text-align: center
      }
    }
  </style>
</head>

<body>
  <nav class="navbar">
    <div class="navbar-title">4M Sistema</div>
    <div class="navbar-right" id="navbarRight"></div>
  </nav>
  <div class="dashboard" id="dashboard">
    <div class="card card-4m" id="card-4m">
      <div class="card-top">
        <div class="title">4M</div>
        <div class="icon"><span class="material-icons">checklist</span></div>
      </div>
      <div class="footer"><span>Checklist 4M</span><span class="badge">Ativo</span></div>
    </div>
  </div>
  <div class="info">Sistema 4M v1.0 | Qualidade</div>
  <div class="modal-wrap" id="modalWrap">
    <div class="modal" id="modalContent"></div>
  </div>
  <script>
    const API_BASE_URL = window.location.hostname === 'localhost' ? 'http://localhost:3001' : '';
    const LAYOUT_KEY = 'dashboardLayout';
    let modules = [];
    let draggedItem = null;

    const q = (s) => document.querySelector(s);
    const qa = (s) => Array.from(document.querySelectorAll(s));
    const getUser = () => JSON.parse(localStorage.getItem('currentUser') || '{}');
    const getToken = () => { const t = localStorage.getItem('authToken'); return t && t !== 'null' && t !== 'undefined' ? t : null };
    const isAdmin = () => getUser().role === 'admin' && !!getToken();
    const isMasterAdmin = () => isAdmin() && getUser().username === 'admin.ti';
    const esc = (v) => String(v || '').replace(/[&<>"']/g, (m) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
    const slug = (v) => String(v || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 60);

    function toast(msg) { const old = q('.toast'); if (old) old.remove(); const el = document.createElement('div'); el.className = 'toast'; el.textContent = msg; document.body.appendChild(el); setTimeout(() => el.remove(), 3000) }
    function closeModal() { q('#modalWrap').classList.remove('active') }
    function openModal(html, afterOpen) { q('#modalContent').innerHTML = html; q('#modalWrap').classList.add('active'); if (typeof afterOpen === 'function') afterOpen() }
    function formError(message = '') { const box = q('[data-form-error]'); if (!box) return; if (message) { box.textContent = message; box.classList.add('active'); return } box.textContent = ''; box.classList.remove('active') }
    function readTrimmed(selector, label) { const field = q(selector); const value = (field?.value || '').trim(); if (!value) throw new Error(`${label} é obrigatório`); return value }
    function normalizeOptional(selector, fallback = '') { const field = q(selector); return ((field?.value || '').trim() || fallback).trim() }
    function validateLink(url) { try { const parsed = new URL(url); if (!['http:', 'https:'].includes(parsed.protocol)) throw new Error(); return parsed.toString() } catch { return null } }

    function renderNavbar() {
      const user = getUser();
      const userBtn = isMasterAdmin() ? '<button class="btn" type="button" onclick="openUserManagement()"><span class="material-icons">manage_accounts</span>Usuários</button>' : '';
      const adminBtn = isAdmin() ? '<button class="btn btn-admin" type="button" onclick="createModule()"><span class="material-icons">add_circle</span>Novo módulo</button>' : '';
      if (user.username && user.role) {
        q('#navbarRight').innerHTML = `${adminBtn}${userBtn}<div class="chip"><span class="material-icons">account_circle</span>${esc(user.username)}<span class="chip ${user.role === 'admin' ? 'btn-danger' : ''}">${user.role === 'admin' ? 'ADM' : 'APR'}</span></div><button class="btn btn-danger" type="button" onclick="logout()"><span class="material-icons">logout</span>Sair</button>`;
        return;
      }
      q('#navbarRight').innerHTML = '<a href="/login.html" class="login-prompt"><span class="material-icons">login</span>Entrar</a>';
    }

    function logout() {
      if (!confirm('Deseja realmente sair do sistema?')) return;
      localStorage.removeItem('currentUser');
      localStorage.removeItem('authToken');
      location.href = '/login.html';
    }

    async function loadModules() {
      try {
        const r = await fetch(`${API_BASE_URL}/api/dashboard-modules`);
        const d = await r.json();
        modules = Array.isArray(d.modules) ? d.modules : [];
      } catch (e) {
        modules = [];
        toast('Não foi possível carregar os módulos');
      }
    }

    function savedOrder() { try { return JSON.parse(localStorage.getItem(LAYOUT_KEY) || '[]') } catch { return [] } }
    function storeOrder() {
      const order = qa('#dashboard .card').map((c) => c.id === 'card-4m' ? '4m' : (c.dataset.kind || c.dataset.module)).filter(Boolean);
      localStorage.setItem(LAYOUT_KEY, JSON.stringify(order));
    }

    function moduleCard(m) {
      const el = document.createElement('div');
      el.className = 'card draggable';
      el.draggable = true;
      el.dataset.module = m.id;
      el.innerHTML = `<div class="card-top"><div class="title">${esc(m.title)}</div><div class="icon"><span class="material-icons">${esc(m.icon || 'description')}</span></div><div class="desc">${esc(m.description || 'Links de formulários')}</div></div><div class="footer"><span>${m.submodules.length} formulário(s)</span><span class="badge">${m.submodules.length}</span></div>`;
      el.onclick = () => openModule(m.id);
      return el;
    }

    function addCard() {
      if (!isAdmin()) return null;
      const el = document.createElement('div');
      el.className = 'card card-add';
      el.dataset.kind = 'add-module';
      el.innerHTML = '<div class="card-top"><div class="icon"><span class="material-icons">add_circle</span></div><div class="title">Criar novo módulo</div><div class="desc">Abra um formulário guiado para cadastrar o card, definir o contexto do módulo e depois incluir os submódulos com seus links.</div><div class="card-add-points"><span><span class="material-icons">widgets</span>Nome e descrição organizados</span><span><span class="material-icons">playlist_add</span>Submódulos incluídos depois</span><span><span class="material-icons">open_in_new</span>Pronto para receber Google Forms</span></div></div><div class="footer"><span>Administração</span><span class="badge">Novo</span></div>';
      el.onclick = createModule;
      return el;
    }

    function renderModules() {
      qa('#dashboard [data-module], #dashboard [data-kind="add-module"]').forEach((n) => n.remove());
      const dash = q('#dashboard');
      modules.forEach((m) => dash.appendChild(moduleCard(m)));
      const add = addCard();
      if (add) dash.appendChild(add);
      const order = savedOrder();
      if (order.length) {
        const cards = qa('#dashboard .card');
        order.forEach((id) => {
          const card = cards.find((c) => (id === '4m' && c.id === 'card-4m') || c.dataset.module === id || c.dataset.kind === id);
          if (card) dash.appendChild(card);
        });
      }
      setupDnD();
    }

    function setupDnD() {
      qa('.card.draggable').forEach((card) => {
        card.ondragstart = function (e) { draggedItem = this; setTimeout(() => this.classList.add('dragging'), 0); e.dataTransfer.setData('text/plain', '') };
        card.ondragend = function () { this.classList.remove('dragging'); draggedItem = null; storeOrder() };
      });
      q('#dashboard').ondragover = function (e) {
        e.preventDefault();
        if (!draggedItem) return;
        const items = qa('.card.draggable:not(.dragging)');
        const next = items.find((item) => e.clientY < item.getBoundingClientRect().top + item.offsetHeight / 2);
        next ? this.insertBefore(draggedItem, next) : this.appendChild(draggedItem);
      };
    }

    function openModule(id) {
      const m = modules.find((x) => x.id === id);
      if (!m) return;
      const list = m.submodules.length ? m.submodules.map((s) => `<div class="sub-item"><div><div class="sub-name">${esc(s.name)}</div></div><div class="sub-actions"><a class="btn" href="${esc(s.url)}" target="_blank" rel="noopener noreferrer"><span class="material-icons">open_in_new</span></a>${isAdmin() ? `<button class="btn" type="button" onclick="editSubmodule('${m.id}','${s.id}')">Editar</button><button class="btn btn-danger" type="button" onclick="deleteSubmodule('${m.id}','${s.id}')">Excluir</button>` : ''}</div></div>`).join('') : '<div class="empty">Nenhum submódulo cadastrado neste card.</div>';
      const actions = isAdmin() ? `<div class="modal-actions"><button class="btn btn-admin" type="button" onclick="addSubmodule('${m.id}')"><span class="material-icons">playlist_add</span>Novo submódulo</button><button class="btn" type="button" onclick="editModule('${m.id}')"><span class="material-icons">edit</span>Editar módulo</button><button class="btn btn-danger" type="button" onclick="deleteModule('${m.id}')"><span class="material-icons">delete</span>Excluir módulo</button></div>` : '';
      openModal(`<div class="modal-header"><div class="modal-header-main"><div class="modal-icon-badge"><span class="material-icons">${esc(m.icon || 'description')}</span></div><div><h2>${esc(m.title)}</h2></div></div><button class="btn btn-ghost" type="button" onclick="closeModal()"><span class="material-icons">close</span>Fechar</button></div><div class="modal-section"><div class="modal-section-title"><h3>Formulários</h3>${isAdmin() ? '<span class="badge">Gerenciamento</span>' : ''}</div><div class="sub-list">${list}</div></div>${actions}`);
    }

    async function saveModules(msg) {
      const r = await fetch(`${API_BASE_URL}/api/dashboard-modules`, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}` }, body: JSON.stringify({ modules }) });
      const d = await r.json();
      if (!r.ok || !d.success) throw new Error(d.message || 'Não foi possível salvar');
      modules = Array.isArray(d.modules) ? d.modules : modules;
      renderModules();
      if (msg) toast(msg);
    }

    async function loadUsers() {
      const response = await fetch(`${API_BASE_URL}/api/admin/users`, {
        headers: { 'Authorization': `Bearer ${getToken()}` }
      });
      const data = await response.json();
      if (!response.ok || !data.success) throw new Error(data.message || 'NÃ£o foi possÃ­vel carregar os usuÃ¡rios');
      return Array.isArray(data.users) ? data.users : [];
    }

    function renderUsersList(users) {
      if (!users.length) {
        return '<div class="empty">Nenhum usuÃ¡rio cadastrado.</div>';
      }

      return `<div class="user-list">${users.map((user) => `<div class="user-row"><div><div class="sub-name">${esc(user.username)}</div></div><span class="badge">${user.role === 'admin' ? 'Admin' : 'Operador'}</span></div>`).join('')}</div>`;
    }

    async function openUserManagement() {
      if (!isMasterAdmin()) return toast('Apenas admin.ti pode gerenciar usuÃ¡rios');

      let usersHtml = '<div class="empty">Carregando usuÃ¡rios...</div>';
      try {
        usersHtml = renderUsersList(await loadUsers());
      } catch (error) {
        usersHtml = `<div class="empty">${esc(error.message || 'NÃ£o foi possÃ­vel carregar os usuÃ¡rios')}</div>`;
      }

      openModal(`<div class="modal-header"><div class="modal-header-main"><div class="modal-icon-badge"><span class="material-icons">manage_accounts</span></div><div><h2>Gerenciar usuÃ¡rios</h2><p class="modal-subtitle">Crie novos logins do sistema. Esta Ã¡rea Ã© exclusiva do admin.ti.</p></div></div><button class="btn btn-ghost" type="button" onclick="closeModal()"><span class="material-icons">close</span>Fechar</button></div><form id="userForm" class="form-grid"><div class="form-banner"><span class="material-icons">admin_panel_settings</span><div><strong>Acesso controlado</strong><br>UsuÃ¡rios novos passam a autenticar pelo MongoDB e nÃ£o dependem mais de credenciais hardcoded.</div></div><div class="form-error" data-form-error></div><div class="field"><label for="newUsername">Username</label><input id="newUsername" name="newUsername" maxlength="40" placeholder="Ex.: maria.silva" /><small>Use apenas letras minÃºsculas, nÃºmeros, ponto, hÃ­fen ou underline.</small></div><div class="field"><label for="newPassword">Senha</label><input id="newPassword" name="newPassword" type="password" maxlength="80" placeholder="MÃ­nimo de 6 caracteres" /></div><div class="field"><label for="newRole">Perfil</label><select id="newRole" name="newRole"><option value="admin">Admin</option><option value="operador">Operador</option></select></div><div class="modal-actions end"><button class="btn btn-admin" type="submit"><span class="material-icons">person_add</span>Criar usuÃ¡rio</button></div></form><div class="modal-section"><div class="modal-section-title"><h3>UsuÃ¡rios cadastrados</h3><span class="badge">admin.ti</span></div>${usersHtml}</div>`, () => {
        const form = q('#userForm');
        q('#newUsername')?.focus();
        form?.addEventListener('submit', submitCreateUser);
      });
    }

    async function submitCreateUser(e) {
      e.preventDefault();
      try {
        formError();
        const username = readTrimmed('#newUsername', 'Username').toLowerCase();
        const password = readTrimmed('#newPassword', 'Senha');
        const role = normalizeOptional('#newRole', 'admin').toLowerCase();

        const response = await fetch(`${API_BASE_URL}/api/admin/users`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${getToken()}`
          },
          body: JSON.stringify({ username, password, role })
        });

        const data = await response.json();
        if (!response.ok || !data.success) throw new Error(data.message || 'NÃ£o foi possÃ­vel criar o usuÃ¡rio');

        toast('UsuÃ¡rio criado com sucesso.');
        await openUserManagement();
      } catch (error) {
        formError(error.message || 'NÃ£o foi possÃ­vel criar o usuÃ¡rio');
      }
    }

    function openModuleForm(config) {
      openModal(`<div class="modal-header"><div class="modal-header-main"><div class="modal-icon-badge"><span class="material-icons">widgets</span></div><div><h2>${esc(config.title)}</h2><p class="modal-subtitle">${esc(config.subtitle)}</p></div></div><button class="btn btn-ghost" type="button" onclick="${config.onCancel || 'closeModal()'}"><span class="material-icons">close</span>Fechar</button></div><form id="moduleForm" class="form-grid"><div class="form-banner"><span class="material-icons">tips_and_updates</span><div><strong>Cadastro rápido</strong><br>Crie o módulo agora e adicione os submódulos depois no detalhe do card.</div></div><div class="form-error" data-form-error></div><div class="field"><label for="moduleTitle">Nome do módulo</label><input id="moduleTitle" name="moduleTitle" maxlength="80" value="${esc(config.values.title || '')}" placeholder="Ex.: Auditorias internas" /><small>Esse nome aparece no card principal.</small></div><div class="field"><label for="moduleDescription">Descrição</label><textarea id="moduleDescription" name="moduleDescription" maxlength="220" placeholder="Resumo curto do objetivo do módulo">${esc(config.values.description || '')}</textarea><small>Use uma descrição curta para orientar quem vai abrir o módulo.</small></div><div class="modal-actions end"><button class="btn" type="button" onclick="${config.onCancel || 'closeModal()'}">Cancelar</button><button class="btn btn-admin" type="submit"><span class="material-icons">${esc(config.submitIcon || 'save')}</span>${esc(config.submitLabel)}</button></div></form>`, () => { const form = q('#moduleForm'); const title = q('#moduleTitle'); title?.focus(); title?.select(); form?.addEventListener('submit', config.onSubmit); });
    }

    function openSubmoduleForm(config) {
      openModal(`<div class="modal-header"><div class="modal-header-main"><div class="modal-icon-badge"><span class="material-icons">playlist_add</span></div><div><h2>${esc(config.title)}</h2><p class="modal-subtitle">${esc(config.subtitle)}</p></div></div><button class="btn btn-ghost" type="button" onclick="${config.onCancel}"><span class="material-icons">close</span>Fechar</button></div><form id="submoduleForm" class="form-grid"><div class="form-banner"><span class="material-icons">link</span><div><strong>Link do formulário</strong><br>Use a URL completa do Google Forms ou outro link HTTP/HTTPS permitido.</div></div><div class="form-error" data-form-error></div><div class="field"><label for="submoduleName">Nome do submódulo</label><input id="submoduleName" name="submoduleName" maxlength="80" value="${esc(config.values.name || '')}" placeholder="Ex.: Checklist de setup" /></div><div class="field"><label for="submoduleUrl">Link</label><input id="submoduleUrl" name="submoduleUrl" maxlength="1000" value="${esc(config.values.url || '')}" placeholder="https://docs.google.com/forms/..." /><small>O backend continuará validando o link antes de salvar.</small></div><div class="modal-actions end"><button class="btn" type="button" onclick="${config.onCancel}">Cancelar</button><button class="btn btn-admin" type="submit"><span class="material-icons">${esc(config.submitIcon || 'save')}</span>${esc(config.submitLabel)}</button></div></form>`, () => { const form = q('#submoduleForm'); const name = q('#submoduleName'); name?.focus(); name?.select(); form?.addEventListener('submit', config.onSubmit); });
    }

    function createModule() {
      if (!isAdmin()) return toast('Apenas administradores podem criar módulos');
      openModuleForm({
        title: 'Criar novo módulo',
        subtitle: 'Cadastre o card principal e organize os submódulos depois.',
        values: { title: '', description: 'Links de formulários' },
        submitLabel: 'Criar módulo',
        submitIcon: 'add_circle',
        onSubmit: submitCreateModule
      });
    }

    async function submitCreateModule(e) {
      e.preventDefault();
      let createdId = null;
      try {
        formError();
        const title = readTrimmed('#moduleTitle', 'Nome do módulo');
        const description = normalizeOptional('#moduleDescription', 'Links de formulários');
        const mod = { id: `${slug(title) || 'modulo'}-${Date.now()}`, title, description, icon: 'description', submodules: [] };
        createdId = mod.id;
        modules.push(mod);
        await saveModules('Módulo criado com sucesso.');
        openModule(mod.id);
      } catch (error) {
        if (createdId) modules = modules.filter((m) => m.id !== createdId);
        if (error?.message) {
          if (error.message.includes('Não foi possível') || error.message.includes('módulo') || error.message.includes('Módulo')) formError(error.message);
          else formError(error.message);
        } else formError('Não foi possível criar o módulo');
      }
    }

    function editModule(id) {
      const mod = modules.find((m) => m.id === id);
      if (!mod || !isAdmin()) return;
      openModuleForm({
        title: 'Editar módulo',
        subtitle: `Ajuste as informações principais de ${mod.title}.`,
        values: { title: mod.title, description: mod.description || 'Links de formulários' },
        submitLabel: 'Salvar alterações',
        submitIcon: 'save',
        onCancel: `openModule('${mod.id}')`,
        onSubmit: (e) => submitEditModule(e, id)
      });
    }

    async function submitEditModule(e, id) {
      e.preventDefault();
      const mod = modules.find((m) => m.id === id);
      if (!mod) return;
      const old = { title: mod.title, description: mod.description };
      try {
        formError();
        mod.title = readTrimmed('#moduleTitle', 'Nome do módulo');
        mod.description = normalizeOptional('#moduleDescription', 'Links de formulários');
        await saveModules('Módulo atualizado com sucesso.');
        openModule(id);
      } catch (error) {
        mod.title = old.title;
        mod.description = old.description;
        formError(error.message || 'Não foi possível atualizar o módulo');
      }
    }

    async function deleteModule(id) {
      const mod = modules.find((m) => m.id === id);
      if (!mod || !isAdmin()) return;
      if (!confirm(`Excluir o módulo "${mod.title}"?`)) return;
      const old = [...modules];
      modules = modules.filter((m) => m.id !== id);
      try {
        await saveModules('Módulo removido com sucesso.');
        closeModal();
      } catch (e) {
        modules = old;
        toast(e.message);
      }
    }

    function addSubmodule(id) {
      const mod = modules.find((m) => m.id === id);
      if (!mod || !isAdmin()) return;
      openSubmoduleForm({
        title: 'Novo submódulo',
        subtitle: `Vincule um formulário ao módulo ${mod.title}.`,
        values: { name: '', url: '' },
        submitLabel: 'Salvar submódulo',
        submitIcon: 'playlist_add',
        onCancel: `openModule('${mod.id}')`,
        onSubmit: (e) => submitCreateSubmodule(e, id)
      });
    }

    async function submitCreateSubmodule(e, id) {
      e.preventDefault();
      const mod = modules.find((m) => m.id === id);
      if (!mod) return;
      let createdId = null;
      try {
        formError();
        const name = readTrimmed('#submoduleName', 'Nome do submódulo');
        const rawUrl = readTrimmed('#submoduleUrl', 'Link');
        const url = validateLink(rawUrl);
        if (!url) throw new Error('Informe um link http ou https válido');
        const sub = { id: `${slug(name) || 'submodulo'}-${Date.now()}`, name, url };
        createdId = sub.id;
        mod.submodules.push(sub);
        await saveModules('Submódulo salvo com sucesso.');
        openModule(id);
      } catch (error) {
        if (createdId) mod.submodules = mod.submodules.filter((s) => s.id !== createdId);
        formError(error.message || 'Não foi possível salvar o submódulo');
      }
    }

    function editSubmodule(moduleId, subId) {
      const mod = modules.find((m) => m.id === moduleId);
      const sub = mod?.submodules.find((s) => s.id === subId);
      if (!mod || !sub || !isAdmin()) return;
      openSubmoduleForm({
        title: 'Editar submódulo',
        subtitle: `Atualize o nome e o link de ${sub.name}.`,
        values: { name: sub.name, url: sub.url },
        submitLabel: 'Salvar alterações',
        submitIcon: 'save',
        onCancel: `openModule('${mod.id}')`,
        onSubmit: (e) => submitEditSubmodule(e, moduleId, subId)
      });
    }

    async function submitEditSubmodule(e, moduleId, subId) {
      e.preventDefault();
      const mod = modules.find((m) => m.id === moduleId);
      const sub = mod?.submodules.find((s) => s.id === subId);
      if (!mod || !sub) return;
      const old = { name: sub.name, url: sub.url };
      try {
        formError();
        const name = readTrimmed('#submoduleName', 'Nome do submódulo');
        const rawUrl = readTrimmed('#submoduleUrl', 'Link');
        const url = validateLink(rawUrl);
        if (!url) throw new Error('Informe um link http ou https válido');
        sub.name = name;
        sub.url = url;
        await saveModules('Submódulo atualizado com sucesso.');
        openModule(moduleId);
      } catch (error) {
        sub.name = old.name;
        sub.url = old.url;
        formError(error.message || 'Não foi possível atualizar o submódulo');
      }
    }

    async function deleteSubmodule(moduleId, subId) {
      const mod = modules.find((m) => m.id === moduleId);
      const sub = mod?.submodules.find((s) => s.id === subId);
      if (!mod || !sub || !isAdmin()) return;
      if (!confirm(`Excluir o submódulo "${sub.name}"?`)) return;
      const old = [...mod.submodules];
      mod.submodules = mod.submodules.filter((s) => s.id !== subId);
      try {
        await saveModules('Submódulo removido com sucesso.');
        openModule(moduleId);
      } catch (e) {
        mod.submodules = old;
        toast(e.message);
      }
    }

    q('#card-4m').onclick = () => location.href = '/4m-checklist.html';
    q('#modalWrap').onclick = (e) => { if (e.target === q('#modalWrap')) closeModal() };
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
      if (e.key === 'F1') {
        e.preventDefault();
        openModal('<div class="modal-header"><div class="modal-header-main"><div class="modal-icon-badge"><span class="material-icons">help</span></div><div><h2>Ajuda</h2><p class="modal-subtitle">Como usar a tela principal de módulos</p></div></div><button class="btn btn-ghost" type="button" onclick="closeModal()"><span class="material-icons">close</span>Fechar</button></div><div class="modal-section"><div class="sub-list"><div class="sub-item"><div><div class="sub-name">Abrir um módulo</div><div class="sub-link">Clique em um card para visualizar os submódulos e links cadastrados.</div></div></div><div class="sub-item"><div><div class="sub-name">Criar novo módulo</div><div class="sub-link">Administradores podem usar o botão "Novo módulo" na barra superior ou no card destacado.</div></div></div><div class="sub-item"><div><div class="sub-name">Gerenciar submódulos</div><div class="sub-link">Dentro do detalhe do módulo, use os botões para adicionar, editar ou remover formulários.</div></div></div></div></div>');
      }
    });

    (async function () { renderNavbar(); await loadModules(); renderModules() })();
  </script>
</body>

</html>
